<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Finance With 4B's</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #FFF8E7;
      --card: #FFD77A;
      --accent: #E6A520;
      --dark: #7A4A00;
      --deep: #4A2800;
      --muted: #9A7040;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--deep);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 18px;
      border: 2px solid rgba(230,165,32,0.3);
      box-shadow: 0 10px 30px rgba(122,74,0,0.12);
      padding: 32px;
    }
    h1 {
      font-family: 'Cinzel', serif;
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(230,165,32,0.3);
      margin-bottom: 16px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--accent), #C88A10);
      border: none;
      color: #fff;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .alert {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert.error {
      background: rgba(220,38,38,0.12);
      color: #dc2626;
      border: 1px solid rgba(220,38,38,0.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <p>Sign in to update gold, silver, and platinum rates.</p>

    {% if error %}
      <div class="alert error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
